version: '3.8'

services:
  backend:
    build: .
    ports:
      - "3000:3000"
    environment:
      DB_BACKEND: postgres
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: mailcatcher
      PG_PASSWORD: localdev
      PG_DATABASE: mailcatcher
      REDIS_URL: redis://redis:6379
      JWT_SECRET: local-dev-jwt-secret
      ENCRYPTION_KEY: local-dev-encryption-key
      FETCH_CONCURRENCY: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    shm_size: '2gb'

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mailcatcher
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: mailcatcher
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailcatcher"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
